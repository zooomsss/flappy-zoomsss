<!DOCTYPE html>
  <html lang="id">
  <head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>molandak zooomsss</title>
  <style>
    /* === Reset dasar & tata letak halaman === */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      /* Latar gradient cerah ala langit modern */
      background: linear-gradient(180deg, #4ec0ff 0%, #87e0ff 60%, #ffe27a 100%);
      font-family: 'Segoe UI', Tahoma, sans-serif;
      overflow: hidden;
      display: flex; justify-content: center; align-items: center;
      user-select: none;
    }

    /* === Wadah game === */
    #wrap {
      position: relative;
      width: 400px; height: 600px;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(0,0,0,0.35);
    }

    /* === Canvas tempat menggambar === */
    canvas {
      display: block;
      background: linear-gradient(180deg, #6cd0ff 0%, #b8ecff 70%, #f6e27a 100%);
      width: 100%; height: 100%;
    }

    /* === Layar overlay (start & game over) === */
    .overlay {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      color: #fff;
      text-shadow: 2px 2px 0 rgba(0,0,0,0.35);
      background: rgba(0,0,0,0.35);
      backdrop-filter: blur(2px);
      text-align: center;
      padding: 20px;
    }
    .overlay.hidden { display: none; }

    .overlay h1 {
      font-size: 42px;
      margin-bottom: 12px;
      color: #ffeb3b;
    }
    .overlay p { font-size: 18px; margin: 6px 0; }
    .overlay .score-final {
      font-size: 32px; font-weight: bold; color: #fff; margin: 14px 0;
    }

    /* === Tombol === */
    button {
      margin-top: 18px;
      padding: 12px 28px;
      font-size: 18px;
      font-weight: bold;
      color: #fff;
      background: linear-gradient(180deg, #ff6b6b, #ee0979);
      border: none;
      border-radius: 30px;
      cursor: pointer;
      box-shadow: 0 6px 0 #b0064d, 0 8px 16px rgba(0,0,0,0.3);
      transition: transform 0.08s ease;
    }
    button:active { transform: translateY(3px); box-shadow: 0 3px 0 #b0064d; }

    /* === Skor di pojok atas === */
    #score {
      position: absolute;
      top: 14px; left: 50%;
      transform: translateX(-50%);
      font-size: 38px; font-weight: bold; color: #fff;
      text-shadow: 2px 2px 0 rgba(0,0,0,0.45);
      pointer-events: none;
    }
  </style>
  </head>
  <body>

  <div id="wrap">
    <!-- Canvas utama tempat semua gambar game ditampilkan -->
    <canvas id="game" width="400" height="600"></canvas>

    <!-- Skor saat bermain -->
    <div id="score">0</div>

    <!-- Layar mulai -->
    <div id="startScreen" class="overlay">
      <h1>Flappy Bird</h1>
      <p>Tekan <b>Space</b> atau <b>Klik / Sentuh</b> layar untuk melompat</p>
      <button id="startBtn">Mulai Bermain</button>
    </div>

    <!-- Layar game over -->
    <div id="gameOverScreen" class="overlay hidden">
      <h1>Game Over</h1>
      <p>Skor Akhir</p>
      <div class="score-final" id="finalScore">0</div>
      <button id="restartBtn">Restart</button>
    </div>
  </div>

  /* ---- 4. Variabel state game (akan direset tiap mulai baru) ---- */
  let bird, pipes, frame, score, pipeSpeed, running, gameOver;

  /* Fungsi reset/inisialisasi game */
  function resetGame() {
    bird = {
      x: 80,            // posisi horizontal (tetap)
      y: H / 2,         // posisi vertikal (tengah layar)
      w: 42, h: 42,     // ukuran sprite burung
      vy: 0,            // kecepatan vertikal
      rot: 0            // rotasi (untuk efek nungging)
    };
    pipes      = [];    // daftar pipa aktif
    frame      = 0;     // counter frame
    score      = 0;     // skor pemain
    pipeSpeed  = 2.2;   // kecepatan awal pipa bergerak ke kiri
    running    = false; // apakah game sedang berjalan
    gameOver   = false; // apakah sudah kalah
    scoreEl.textContent = '0';
  }

  /* ---- 5. Fungsi melompat ---- */
  function flap() {
    if (gameOver) return;          // saat game over, abaikan
    if (!running) running = true;  // mulai game saat input pertama
    bird.vy = JUMP_POWER;          // dorong burung ke atas
  }

  /* ---- 6. Spawn pipa baru dengan tinggi celah acak ---- */
  function spawnPipe() {
    // Hitung area aman agar celah tidak terlalu mepet atas/bawah
    const minTop = 50;
    const maxTop = H - GROUND_H - PIPE_GAP - 50;
    const topHeight = Math.random() * (maxTop - minTop) + minTop;
    pipes.push({
      x: W,                        // muncul dari sisi kanan
      top: topHeight,              // tinggi pipa atas
      bottom: topHeight + PIPE_GAP,// posisi y mulai pipa bawah
      passed: false                // apakah sudah dilewati (untuk skor)
    });
  }

  /* ---- 7. Deteksi tabrakan kotak (AABB collision) ---- */
  function collide(bx, by, bw, bh, px, py, pw, ph) {
    return bx < px + pw && bx + bw > px && by < py + ph && by + bh > py;
  }

  /* ---- 8. Fungsi update logika tiap frame ---- */
  function update() {
    if (!running) return;

    /* --- Gerakan burung dengan gravitasi --- */
    bird.vy += GRAVITY;
    bird.y  += bird.vy;
    // rotasi proporsional dengan kecepatan vertikal (efek visual)
    bird.rot = Math.max(-0.5, Math.min(1.2, bird.vy / 12));

    /* --- Cek tabrakan dengan tanah / langit --- */
    if (bird.y + bird.h >= H - GROUND_H || bird.y <= 0) {
      return endGame();
    }

    /* --- Spawn pipa secara berkala --- */
    if (frame % PIPE_INTERVAL === 0) spawnPipe();

    /* --- Update tiap pipa --- */
    for (let i = pipes.length - 1; i >= 0; i--) {
      const p = pipes[i];
      p.x -= pipeSpeed;

      // Cek tabrakan dengan pipa atas & bawah
      if (
        collide(bird.x, bird.y, bird.w, bird.h, p.x, 0, PIPE_WIDTH, p.top) ||
        collide(bird.x, bird.y, bird.w, bird.h, p.x, p.bottom, PIPE_WIDTH, H - p.bottom - GROUND_H)
      ) {
        return endGame();
      }

      // Tambah skor saat burung melewati pipa
      if (!p.passed && p.x + PIPE_WIDTH < bird.x) {
        p.passed = true;
        score++;
        scoreEl.textContent = score;
        // Tingkatkan kecepatan pipa secara perlahan tiap 5 skor
        if (score % 5 === 0) pipeSpeed += 0.25;
      }

      // Hapus pipa yang sudah keluar layar
      if (p.x + PIPE_WIDTH < 0) pipes.splice(i, 1);
    }

    frame++;
  }

  /* ---- 9. Fungsi menggambar tiap frame ---- */
  function draw() {
    /* --- Bersihkan canvas dengan latar langit --- */
    const sky = ctx.createLinearGradient(0, 0, 0, H);
    sky.addColorStop(0, '#6cd0ff');
    sky.addColorStop(0.7, '#b8ecff');
    sky.addColorStop(1, '#f6e27a');
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, W, H);

    /* --- Awan dekoratif sederhana --- */
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    for (let i = 0; i < 3; i++) {
      const cx = ((frame * 0.3) + i * 160) % (W + 100) - 50;
      ctx.beginPath();
      ctx.arc(cx, 80 + i * 40, 22, 0, Math.PI * 2);
      ctx.arc(cx + 22, 78 + i * 40, 28, 0, Math.PI * 2);
      ctx.arc(cx + 50, 84 + i * 40, 20, 0, Math.PI * 2);
      ctx.fill();
    }

    /* --- Gambar pipa dengan warna cerah --- */
    for (const p of pipes) {
      const grad = ctx.createLinearGradient(p.x, 0, p.x + PIPE_WIDTH, 0);
      grad.addColorStop(0, '#2ecc71');
      grad.addColorStop(0.5, '#27ae60');
      grad.addColorStop(1, '#145a32');
      ctx.fillStyle = grad;

      // Pipa atas
      ctx.fillRect(p.x, 0, PIPE_WIDTH, p.top);
      // Pipa bawah
      ctx.fillRect(p.x, p.bottom, PIPE_WIDTH, H - p.bottom - GROUND_H);

      // Tutup pipa (atas)
      ctx.fillStyle = '#1e8449';
      ctx.fillRect(p.x - 4, p.top - 18, PIPE_WIDTH + 8, 18);
      ctx.fillRect(p.x - 4, p.bottom, PIPE_WIDTH + 8, 18);
    }

    /* --- Gambar tanah --- */
    ctx.fillStyle = '#deb887';
    ctx.fillRect(0, H - GROUND_H, W, GROUND_H);
    ctx.fillStyle = '#8b5a2b';
    ctx.fillRect(0, H - GROUND_H, W, 8);
    // motif rumput sederhana
    ctx.fillStyle = '#6abf4b';
    ctx.fillRect(0, H - GROUND_H - 6, W, 6);

    /* --- Gambar burung dengan rotasi --- */
    ctx.save();
    ctx.translate(bird.x + bird.w / 2, bird.y + bird.h / 2);
    ctx.rotate(bird.rot);
    if (birdImg.complete && birdImg.naturalWidth > 0) {
      ctx.drawImage(birdImg, -bird.w / 2, -bird.h / 2, bird.w, bird.h);
    } else {
      // Fallback bila gambar belum siap: lingkaran kuning
      ctx.fillStyle = '#ffeb3b';
      ctx.beginPath();
      ctx.arc(0, 0, bird.w / 2, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  /* ---- 10. Game loop utama (60 fps) ---- */
  function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
  }

  /* ---- 11. Akhiri game ---- */
  function endGame() {
    running  = false;
    gameOver = true;
    finalScoreEl.textContent = score;
    gameOverScreen.classList.remove('hidden');
  }

  /* ---- 12. Mulai / restart game ---- */
  function startGame() {
    resetGame();
    startScreen.classList.add('hidden');
    gameOverScreen.classList.add('hidden');
    running = true;
  }

  /* ---- 13. Event listener: keyboard, klik, sentuh ---- */
  document.addEventListener('keydown', e => {
    if (e.code === 'Space') {
      e.preventDefault();
      if (gameOver)            startGame();
      else if (!running)       startGame();
      flap();
    }
  });

  canvas.addEventListener('mousedown',  flap);
  canvas.addEventListener('touchstart', e => { e.preventDefault(); flap(); }, { passive: false });

  startBtn.addEventListener('click', startGame);
  restartBtn.addEventListener('click', startGame);

  /* ---- 14. Inisialisasi & jalankan loop ---- */
  resetGame();
  loop();
  </script>
  </body>
  </html>
